# ============================================================
# docker-compose.yml — Local Development
# ============================================================
# This spins up the backend + frontend behind an Nginx reverse proxy.
# The database lives on Supabase (cloud) — no local Postgres needed.
#
# Usage:
#   docker-compose up --build
#   Frontend         → http://localhost:3000
#   Backend          → http://localhost:3000/api  (proxied via Nginx)
#   Grafana          → http://localhost:3001
#   VictoriaMetrics  → http://localhost:8428
#   Loki             → http://localhost:3100
# ============================================================

services:

  # ─── .NET 8 Web API ────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: medmon_backend
    environment:
      - ASPNETCORE_ENVIRONMENT=Development   
      - ConnectionStrings__Supabase=${SUPABASE_CONN_STRING}
      - Jwt__Secret=${JWT_SECRET}
      - Jwt__Issuer=${JWT_ISSUER}
      - Jwt__Audience=${JWT_AUDIENCE}
      - LOKI_URL=${LOKI_URL_INTERNAL}
    expose:
      - "5000"
    ports:
      - "5000:5000"
    restart: unless-stopped

  # ─── React 19 + Vite (production build) ────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: medmon_frontend
    expose:
      - "80"
    depends_on:
      - backend
    restart: unless-stopped

  # ─── Nginx Reverse Proxy ────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: medmon_nginx
    ports:
      - "3000:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

  # ─── VictoriaMetrics ────────────────────────────────────────
  victoriametrics:
    image: victoriametrics/victoria-metrics:latest
    container_name: medmon_victoriametrics
    ports:
      - "8428:8428"
    volumes:
      - vm_data:/storage
    command:
      - "--storageDataPath=/storage"
      - "--retentionPeriod=15d"
      - "--httpListenAddr=:8428"
    restart: unless-stopped

  # ─── Loki ──────────────────────────────────────────────────
  loki:
    image: grafana/loki:latest
    container_name: medmon_loki
    ports:
      - "3100:3100"
    volumes:
      - loki_data:/loki
      - ./docker/loki-config.yml:/etc/loki/loki-config.yml:ro
    command: -config.file=/etc/loki/loki-config.yml
    restart: unless-stopped

  # ─── Grafana ───────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: medmon_grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
    depends_on:
      - victoriametrics
      - loki
    restart: unless-stopped

# ─── Named Volumes ────────────────────────────────────────────
# vm_data    — temp  (15 days enforced by --retentionPeriod flag)
# loki_data  — temp  (15 days enforced by loki-config.yml)
# grafana_data — permanent (no retention limit)
volumes:
  vm_data:
  loki_data:
  grafana_data:
