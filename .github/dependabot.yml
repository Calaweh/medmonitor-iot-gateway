version: 2
updates:
  - package-ecosystem: "nuget" # Monitor .NET libraries
    directory: "/backend"
    schedule:
      interval: "weekly"
  - package-ecosystem: "npm"   # Monitor React libraries
    directory: "/frontend"
    schedule:
      interval: "weekly"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
