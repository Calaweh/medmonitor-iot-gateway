name: Supabase Keep-Alive Ping
on:
  schedule:
    # Runs at 00:00 every 3rd day
    - cron: '0 0 */3 * *'
  workflow_dispatch: # Allows manual trigger from GH UI
jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Call health check to wake database
        # /health — liveness check (fast, no DB query)
        # /health/db — readiness check (confirms Supabase Postgres is reachable)
        # Update YOUR_APP_NAME once deployed to Render/Railway
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://your-app-name.onrender.com/health)
          echo "Health check responded with HTTP $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "::warning::Health check returned $STATUS — backend may be sleeping or unhealthy"
          fi