# ============================================================
# Nginx Reverse Proxy Config — Local Docker Dev
# ============================================================
# Routes:
#   /api/*  → .NET backend  (container: medmon_backend:5000)
#   /*      → React frontend (container: medmon_frontend:80)
#
# This mirrors the pattern you'll use in production on Render/Railway.
# ============================================================

server {
    listen 80;
    server_name localhost;

    # ─── Frontend (React SPA) ──────────────────────────────
    location / {
        proxy_pass         http://frontend:80;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # ─── Backend REST API ──────────────────────────────────
    location /api/ {
        proxy_pass         http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;

        # In production, uncomment these to require hardware certs
        # ssl_verify_client      on;
        # ssl_client_certificate /etc/nginx/certs/ca.crt;
    
        # Passes the unique hardware ID to the .NET Backend
        proxy_set_header X-Device-Api-Key $ssl_client_fingerprint;

        # CORS headers (dev only — tighten in production)
        add_header Access-Control-Allow-Origin  "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # ─── SignalR WebSocket Hub ─────────────────────────────
    location /hubs/ {
        proxy_pass             http://backend:5000;
        proxy_http_version     1.1;
        proxy_set_header       Upgrade    $http_upgrade;
        proxy_set_header       Connection "Upgrade";
        proxy_set_header       Host       $host;
        proxy_read_timeout     3600s;
        proxy_send_timeout     3600s;
    }
}
