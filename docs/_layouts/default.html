<!DOCTYPE html>
<html lang="en-US">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    {% seo %}
    <link rel="stylesheet" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">
    <style>
      /* Fix for Mermaid diagrams looking too small or squished */
      .mermaid { 
        background: white; 
        padding: 20px; 
        border-radius: 10px; 
        margin: 20px 0;
        overflow-x: auto;
      }
      /* Hide the default theme header if it still appears */
      header { display: none !important; }
      .wrapper { max-width: 900px !important; }
    </style>
  </head>
  <body>
    <div class="wrapper">
      <!-- We removed the <header> block from here -->
      <section>
        {{ content }}
      </section>
    </div>
    
    <!-- Mermaid.js Logic -->
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
    <script>
      mermaid.initialize({ 
        startOnLoad: true, 
        theme: 'default',
        securityLevel: 'loose'
      });
    </script>
  </body>
</html>
